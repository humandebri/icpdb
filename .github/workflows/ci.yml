name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  icpdb-console-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: icpdb-console
    steps:
      - uses: actions/checkout@v5
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: icpdb-console/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run lint
        run: pnpm lint
      - name: Run typecheck
        run: pnpm typecheck
      - name: Build static export
        run: pnpm build
      - name: Build Cloudflare Worker
        run: pnpm build:worker

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run tests
        run: cargo test -p icpdb-runtime -p icpdb-canister --locked
      - name: Run clippy
        run: cargo clippy -p icpdb-runtime -p icpdb-canister --all-targets --locked -- -D warnings

  canister-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Add wasm target
        run: rustup target add wasm32-wasip1
      - name: Install WASI sysroot
        run: sudo apt-get update && sudo apt-get install -y wasi-libc
      - name: Install wasm tooling
        run: cargo install wasi2ic ic-wasm --locked
      - name: Build canister artifact
        env:
          ICP_WASM_OUTPUT_PATH: /tmp/icpdb_canister.wasm
        run: bash scripts/build-icpdb-canister.sh
