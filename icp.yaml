canisters:
  - name: icpdb
    build:
      steps:
        - type: script
          commands:
            - bash scripts/build-vfs-canister.sh

networks:
  - name: local-icpdb
    mode: managed
    ii: true
    gateway:
      bind: 127.0.0.1
      port: 8001

environments:
  - name: local-icpdb
    network: local-icpdb
    canisters:
      - icpdb
