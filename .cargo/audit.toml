# Where: .cargo/audit.toml
# What: cargo-audit policy for known upstream advisories.
# Why: ICPDB keeps unavoidable IC SDK transitive warnings explicit.

[advisories]
ignore = [
    # RUSTSEC-2024-0436 is an unmaintained warning for `paste`.
    # ICPDB reaches it through `candid`/IC SDK crates, and candid 0.10.27
    # still depends on paste. Avoid a local candid fork until upstream removes it.
    "RUSTSEC-2024-0436",
]
